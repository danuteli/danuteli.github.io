<!DOCTYPE html>
<html lang="en"> 
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">

        <title>Other Latvia</title>

        <link rel="stylesheet" href="styles/style.css">
        <style>

            main {
                width: 100vw;
                min-height: 100vh;
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: space-around;
            }

           #content {
                display: flex;
                width: 70vw;
                gap: 3rem;
            }

            #content div {
                width: calc(70vw - 3rem);
                height: 40vw;
                
            }

            #content .image {
                overflow: hidden;
            }

            .image img {
                height: 100%;
            }

            .text h2 {
                padding: 1rem 0;
            }


            .back {
                align-self: flex-end;
                margin: 3rem;
                width: fit-content;
                height: fit-content;
            }



            @media screen and (max-width: 1000px) {
                #content {
                    flex-direction: column;
                }

                #content div {
                    width: 70vw;
                    height: 80vw;
                }

                .text h2 {
                    padding-top: 0;
                }

                
            }

            @media screen and (max-width: 600px) {

                #content {
                    width: 80vw;
                }
            
                #content div {
                width: 80vw;
                height: 80vw;
            }

            .text h2 {
                padding-top: 0;
            }
            }

            

        </style>

        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Roboto&display=swap" rel="stylesheet">

        <script src="scripts/renderContent.js"></script>
        <script>
            window.onload = () => {
                getContent();
            };
        </script>
    </head>
    <body>
        <main>
            <div id="content">
                <div class="image">
                    <img>
                </div>
                <div class="text">
                    <h2></h2>
                    <p></p>
                </div>
            </div>
            <button onclick="goBack()" class="back">back</button>
        </main>
        <script>
            function goBack() {
                localStorage.removeItem('data');
                window.history.go(-1);
            }
        </script>
        
    </body>
</html>
