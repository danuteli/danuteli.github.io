<!DOCTYPE html>
<html lang="en"> 
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">

        <meta name="robots" content="noindex">

        <title>Other Latvia</title>

        <link rel="stylesheet" href="styles/style.css">
        <style>

            main {
                width: 70vw;
                min-height: 100vh;
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: space-around;
                gap: 5rem;
                margin: 5rem 0;
            }

           #content {
                display: grid;
                width: 70vw;
                height: fit-content;
                grid-template-rows: calc((70vw - 5rem)/2) 1fr 1fr;
                grid-template-columns: 1fr 1fr;
                gap: 5rem;
            }

            .content-img {
                grid-row: 1;
                grid-column: 1;
                overflow: hidden;
                height: 100%;
            }

            .content-img > img {
                height: 100%;
            }

            .content-title {
                grid-row: 1;
                grid-column: 2;
            }

            .content-text {
                grid-row: 2 / 4;
                grid-column: 1 / 3;
            }


            .btn-back {
                align-self: flex-end;
            }

            @media screen and (max-width: 650px) {

                #content {
                    grid-template-rows: 70vw 5rem 1fr;
                    gap: 3rem;
                }

                .content-img {
                    grid-row: 1;
                    grid-column: 1 / 3;
                }

                .content-title {
                    grid-row: 2;
                    grid-column: 1 / 3;
                }

                

                .content-text {
                    grid-row: 3;
                    grid-column: 1 / 3;
                }
            }
            

        </style>

        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Roboto&display=swap" rel="stylesheet">

        <script src="scripts/renderContent.js"></script>
        <script>
            window.onload = () => {
                getContent();
            };
        </script>
    </head>
    <body>
        <main>
            <div id="content">
                <div class="content-img">
                    <img>
                </div>
                <div class="content-title">
                    <h2></h2>
                </div>
                <div class="content-text">
                    <p></p>
                </div>
            </div>
            <button onclick="goBack()" class="btn-back">back</button>
        </main>
        
    </body>
</html>
